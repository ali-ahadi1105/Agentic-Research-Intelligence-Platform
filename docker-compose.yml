# ============================================================
# Docker Compose for Agentic Research Intelligence Platform
# ============================================================
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. Run: docker-compose up -d
#   3. Access: http://localhost:3000
# ============================================================

version: '3.8'

services:
  # ============================================================
  # Application Server
  # ============================================================
  app:
    build: .
    container_name: research-platform
    ports:
      - "3000:3000"
    environment:
      # Database
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}

      # Auth
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}

      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}

      # Optional providers
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}

      # Embeddings (optional, separate from chat)
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - research-network

    # Volume for uploaded files (if using local storage)
    volumes:
      - uploads:/app/uploads
      - ./db:/app/db

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # PostgreSQL Database with pgvector
  # ============================================================
  db:
    image: pgvector/pgvector:pg15
    container_name: research-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-research_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-research_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Optional: custom PostgreSQL config
      # - ./postgres.conf:/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research_user -d research_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - research-network

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Nginx Reverse Proxy (optional — for production)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: research-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - research-network
    profiles:
      - production

  # ============================================================
  # Redis (optional — for caching at scale)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: research-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - research-network
    profiles:
      - with-cache

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  redisdata:
    driver: local

networks:
  research-network:
    driver: bridge
